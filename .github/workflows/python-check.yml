name: Python check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  py-compile:
    name: Python syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile Python files
        run: python -m compileall Nim Chomp nim_variant utils
